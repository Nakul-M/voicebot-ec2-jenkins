<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens ───────────────────────────────────── */
    :root {
      --bg:          #080808;
      --surface:     #111111;
      --surface-2:   #1a1a1a;
      --border:      #222222;
      --gold:        #c9963a;
      --gold-light:  #e8b85a;
      --gold-dim:    rgba(201,150,58,0.18);
      --text:        #e2e2e2;
      --muted:       #555555;
      --danger:      #c0392b;
      --safe:        #27ae60;
      --mono:        'JetBrains Mono', monospace;
      --serif:       'Playfair Display', Georgia, serif;
      --radius:      4px;
      --transition:  0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      overflow: hidden;
    }

    /* ── Grain texture overlay ───────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
    }

    /* ── Layout ──────────────────────────────────────────── */
    #app {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 1fr 340px;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      gap: 0;
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,8,0.95);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .brand-name {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.02em;
    }

    .brand-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color var(--transition);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background var(--transition), box-shadow var(--transition);
    }

    .status-pill.connecting .status-dot {
      background: var(--gold);
      box-shadow: 0 0 8px var(--gold);
      animation: blink 1s ease infinite;
    }
    .status-pill.connected .status-dot {
      background: var(--safe);
      box-shadow: 0 0 8px var(--safe);
    }
    .status-pill.connected { color: var(--safe); }
    .status-pill.listening .status-dot {
      background: var(--gold-light);
      box-shadow: 0 0 10px var(--gold-light);
      animation: blink 0.6s ease infinite;
    }
    .status-pill.listening { color: var(--gold-light); }
    .status-pill.speaking .status-dot {
      background: #60a5fa;
      box-shadow: 0 0 10px #60a5fa;
    }
    .status-pill.speaking { color: #60a5fa; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Main Stage ──────────────────────────────────────── */
    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient background gradient */
    .stage::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,150,58,0.06) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: opacity var(--transition);
    }
    .stage.speaking::before {
      background: radial-gradient(circle, rgba(96,165,250,0.08) 0%, transparent 70%);
    }

    /* ── Orb ─────────────────────────────────────────────── */
    .orb-wrapper {
      position: relative;
      width: 200px; height: 200px;
    }

    /* Ripple rings */
    .ripple {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid var(--gold);
      opacity: 0;
      transform: scale(1);
    }
    .orb-wrapper.listening .ripple:nth-child(1) { animation: ripple 2s ease-out infinite 0s; }
    .orb-wrapper.listening .ripple:nth-child(2) { animation: ripple 2s ease-out infinite 0.5s; }
    .orb-wrapper.listening .ripple:nth-child(3) { animation: ripple 2s ease-out infinite 1s; }

    .orb-wrapper.speaking .ripple {
      border-color: #60a5fa;
    }
    .orb-wrapper.speaking .ripple:nth-child(1) { animation: ripple 1.2s ease-out infinite 0s; }
    .orb-wrapper.speaking .ripple:nth-child(2) { animation: ripple 1.2s ease-out infinite 0.3s; }
    .orb-wrapper.speaking .ripple:nth-child(3) { animation: ripple 1.2s ease-out infinite 0.6s; }

    @keyframes ripple {
      0%   { opacity: 0.6; transform: scale(0.9); }
      100% { opacity: 0;   transform: scale(1.8); }
    }

    /* Core orb */
    .orb {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #2a2a2a, #0d0d0d);
      border: 1px solid #282828;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: box-shadow 0.5s ease, border-color 0.5s ease;
      animation: breathe 4s ease-in-out infinite;
    }

    .orb::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.06), transparent 60%);
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.03); }
    }

    .orb-wrapper.idle .orb {
      box-shadow: 0 0 30px rgba(201,150,58,0.1), inset 0 0 20px rgba(0,0,0,0.5);
      border-color: #282828;
    }
    .orb-wrapper.listening .orb {
      box-shadow: 0 0 50px rgba(201,150,58,0.25), inset 0 0 20px rgba(0,0,0,0.5);
      border-color: rgba(201,150,58,0.4);
      animation: breathe 1.5s ease-in-out infinite;
    }
    .orb-wrapper.speaking .orb {
      box-shadow: 0 0 60px rgba(96,165,250,0.3), inset 0 0 20px rgba(0,0,0,0.5);
      border-color: rgba(96,165,250,0.4);
      animation: breathe 0.8s ease-in-out infinite;
    }

    /* Mic icon inside orb */
    .orb-icon {
      width: 36px; height: 36px;
      opacity: 0.6;
      transition: opacity var(--transition);
    }
    .orb:hover .orb-icon { opacity: 0.9; }

    /* ── Waveform Visualiser ─────────────────────────────── */
    .waveform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 48px;
    }

    .bar {
      width: 3px;
      border-radius: 2px;
      background: var(--gold);
      height: 4px;
      transition: height 0.08s ease;
      opacity: 0.5;
    }

    .waveform.active .bar { opacity: 1; }
    .waveform.speaking .bar { background: #60a5fa; opacity: 1; }

    /* ── Call Controls ───────────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 11px 26px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      transition: all var(--transition);
      user-select: none;
    }

    .btn-start {
      background: var(--gold);
      color: #080808;
      border-color: var(--gold);
      font-weight: 500;
    }
    .btn-start:hover {
      background: var(--gold-light);
      border-color: var(--gold-light);
      box-shadow: 0 0 24px rgba(201,150,58,0.35);
    }

    .btn-end {
      background: transparent;
      color: #ef4444;
      border-color: #3a1a1a;
    }
    .btn-end:hover {
      background: rgba(239,68,68,0.08);
      border-color: #ef4444;
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* ── Right Panel ─────────────────────────────────────── */
    .panel {
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--surface);
      overflow: hidden;
    }

    .panel-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .badge {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
      background: var(--surface-2);
      color: var(--muted);
    }

    /* ── Transcript ──────────────────────────────────────── */
    #transcript {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #transcript::-webkit-scrollbar { width: 4px; }
    #transcript::-webkit-scrollbar-track { background: transparent; }
    #transcript::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .msg.user .msg-label { color: rgba(201,150,58,0.7); }
    .msg.assistant .msg-label { color: rgba(96,165,250,0.7); }

    .msg-text {
      font-size: 12.5px;
      line-height: 1.55;
      color: var(--text);
      background: var(--surface-2);
      border-radius: var(--radius);
      padding: 10px 12px;
      border-left: 2px solid var(--border);
      word-break: break-word;
    }
    .msg.user .msg-text { border-left-color: var(--gold-dim); }
    .msg.assistant .msg-text { border-left-color: rgba(96,165,250,0.2); }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    .empty-state-icon { font-size: 28px; opacity: 0.3; }
    .empty-state-text { font-size: 11px; line-height: 1.7; opacity: 0.6; }

    /* ── Session Info Panel ──────────────────────────────── */
    .info-bar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 32px;
      padding: 10px 32px;
      border-top: 1px solid var(--border);
      background: rgba(8,8,8,0.95);
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      color: var(--muted);
    }

    .info-item span:first-child {
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .info-value {
      color: var(--text);
      font-weight: 500;
    }

    /* ── Error Toast ─────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 60px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a0a0a;
      border: 1px solid #3a1a1a;
      color: #ef4444;
      font-size: 11px;
      letter-spacing: 0.05em;
      padding: 10px 20px;
      border-radius: var(--radius);
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Hidden audio ────────────────────────────────────── */
    #remoteAudio { display: none; }
  </style>
</head>
<body>

<div id="app">

  <!-- ── Header ─────────────────────────────────────────── -->
  <header>
    <div class="brand">
      <span class="brand-name">Nexus</span>
      <span class="brand-tag">Voice Intelligence</span>
    </div>
    <div class="header-meta">
      <div class="status-pill idle" id="statusPill">
        <div class="status-dot"></div>
        <span id="statusText">Idle</span>
      </div>
    </div>
  </header>

  <!-- ── Main Stage ─────────────────────────────────────── -->
  <main class="stage idle" id="stage">
    <!-- Orb -->
    <div class="orb-wrapper idle" id="orbWrapper">
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="orb" id="orb" title="Click to toggle connection">
        <!-- Microphone SVG -->
        <svg class="orb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4z" stroke="var(--gold)" fill="rgba(201,150,58,0.1)"/>
          <path d="M19 11a7 7 0 0 1-14 0" stroke="var(--gold)"/>
          <line x1="12" y1="19" x2="12" y2="23" stroke="var(--gold)"/>
          <line x1="8"  y1="23" x2="16" y2="23" stroke="var(--gold)"/>
        </svg>
      </div>
    </div>

    <!-- Waveform bars (mic input visualiser) -->
    <div class="waveform" id="waveform">
      <!-- 24 bars injected by JS -->
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-start" id="btnConnect">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16"/></svg>
        Start Session
      </button>
      <button class="btn btn-end" id="btnDisconnect" disabled>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        End Session
      </button>
    </div>
  </main>

  <!-- ── Right Panel ─────────────────────────────────────── -->
  <aside class="panel">
    <div class="panel-header">
      <span class="panel-title">Transcript</span>
      <span class="badge" id="msgCount">0 messages</span>
    </div>
    <div id="transcript">
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">◎</div>
        <div class="empty-state-text">
          Start a session and speak.<br/>
          Your conversation will appear here.
        </div>
      </div>
    </div>
  </aside>

  <!-- ── Footer Info Bar ────────────────────────────────── -->
  <div class="info-bar">
    <div class="info-item">
      <span>Model</span>
      <span class="info-value">GPT-4o Mini</span>
    </div>
    <div class="info-item">
      <span>Session</span>
      <span class="info-value" id="sessionId">—</span>
    </div>
    <div class="info-item">
      <span>Latency</span>
      <span class="info-value" id="latencyDisplay">—</span>
    </div>
    <div class="info-item">
      <span>Duration</span>
      <span class="info-value" id="durationDisplay">00:00</span>
    </div>
  </div>

</div>

<!-- Hidden remote audio element -->
<audio id="remoteAudio" autoplay playsinline></audio>

<!-- Error toast -->
<div id="toast"></div>

<script>
  // ─────────────────────────────────────────────────────────
  // State
  // ─────────────────────────────────────────────────────────
  let pc          = null;   // RTCPeerConnection
  let localStream = null;   // Mic MediaStream
  let dataChannel = null;   // RTCDataChannel
  let analyser    = null;   // AudioAnalyser for waveform
  let audioCtx    = null;
  let animFrame   = null;
  let sessionTimer = null;
  let sessionSecs  = 0;
  let connectStart = null;
  let msgCount     = 0;

  const SESSION_ID = crypto.randomUUID().slice(0, 8).toUpperCase();

  // ─────────────────────────────────────────────────────────
  // DOM refs
  // ─────────────────────────────────────────────────────────
  const $status     = document.getElementById('statusPill');
  const $statusText = document.getElementById('statusText');
  const $stage      = document.getElementById('stage');
  const $orb        = document.getElementById('orbWrapper');
  const $waveform   = document.getElementById('waveform');
  const $transcript = document.getElementById('transcript');
  const $emptyState = document.getElementById('emptyState');
  const $btnConn    = document.getElementById('btnConnect');
  const $btnDisc    = document.getElementById('btnDisconnect');
  const $sessionId  = document.getElementById('sessionId');
  const $latency    = document.getElementById('latencyDisplay');
  const $duration   = document.getElementById('durationDisplay');
  const $msgCount   = document.getElementById('msgCount');
  const $remoteAudio = document.getElementById('remoteAudio');
  const $toast      = document.getElementById('toast');
  const $orb_el     = document.getElementById('orb');

  // ─────────────────────────────────────────────────────────
  // Waveform bars
  // ─────────────────────────────────────────────────────────
  const BAR_COUNT = 28;
  const bars = [];
  for (let i = 0; i < BAR_COUNT; i++) {
    const b = document.createElement('div');
    b.className = 'bar';
    $waveform.appendChild(b);
    bars.push(b);
  }

  function idleWave() {
    // Gentle sine idle animation when not connected
    const t = Date.now() / 800;
    bars.forEach((b, i) => {
      const h = 4 + Math.sin(t + i * 0.4) * 3;
      b.style.height = h + 'px';
    });
    animFrame = requestAnimationFrame(idleWave);
  }

  function liveWave(dataArray) {
    bars.forEach((b, i) => {
      // Map frequency bins to bars
      const idx = Math.floor(i * dataArray.length / BAR_COUNT);
      const v = dataArray[idx] / 255;
      const h = 4 + v * 44;
      b.style.height = h + 'px';
    });
  }

  // Start idle wave on load
  idleWave();

  // ─────────────────────────────────────────────────────────
  // State helpers
  // ─────────────────────────────────────────────────────────
  function setState(state) {
    ['idle','connecting','connected','listening','speaking'].forEach(s => {
      $status.classList.remove(s);
      $orb.classList.remove(s);
      $stage.classList.remove(s);
      $waveform.classList.remove(s);
    });
    $status.classList.add(state);
    $orb.classList.add(state);
    $stage.classList.add(state);
    if (state === 'listening') $waveform.classList.add('active');
    if (state === 'speaking')  $waveform.classList.add('speaking');

    const labels = {
      idle:       'Idle',
      connecting: 'Connecting…',
      connected:  'Connected',
      listening:  'Listening',
      speaking:   'AI Speaking',
    };
    $statusText.textContent = labels[state] || state;
  }

  function showToast(msg, duration = 3500) {
    $toast.textContent = msg;
    $toast.classList.add('show');
    setTimeout(() => $toast.classList.remove('show'), duration);
  }

  function updateMsgCount() {
    $msgCount.textContent = msgCount === 1 ? '1 message' : `${msgCount} messages`;
  }

  // ─────────────────────────────────────────────────────────
  // Transcript
  // ─────────────────────────────────────────────────────────
  function addMessage(role, text) {
    if ($emptyState) $emptyState.remove();
    msgCount++;
    updateMsgCount();

    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? '▸ You' : '◈ Nexus';

    const content = document.createElement('div');
    content.className = 'msg-text';
    content.textContent = text;

    div.appendChild(label);
    div.appendChild(content);
    $transcript.appendChild(div);
    $transcript.scrollTop = $transcript.scrollHeight;
  }

  // ─────────────────────────────────────────────────────────
  // Audio Visualiser (mic input)
  // ─────────────────────────────────────────────────────────
  function startVisualiser(stream) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 64;
    const src = audioCtx.createMediaStreamSource(stream);
    src.connect(analyser);
    const dataArray = new Uint8Array(analyser.frequencyBinCount);

    function draw() {
      analyser.getByteFrequencyData(dataArray);
      liveWave(dataArray);
      animFrame = requestAnimationFrame(draw);
    }
    cancelAnimationFrame(animFrame);
    draw();
  }

  // ─────────────────────────────────────────────────────────
  // Detect AI speaking via remote audio volume
  // ─────────────────────────────────────────────────────────
  let remoteAnalyser  = null;
  let remoteAudioCtx  = null;
  let speakingTimeout = null;

  function watchRemoteAudio(stream) {
    if (!remoteAudioCtx) remoteAudioCtx = new AudioContext();
    remoteAnalyser = remoteAudioCtx.createAnalyser();
    remoteAnalyser.fftSize = 32;
    const src = remoteAudioCtx.createMediaStreamSource(stream);
    src.connect(remoteAnalyser);
    const data = new Uint8Array(remoteAnalyser.frequencyBinCount);

    function check() {
      remoteAnalyser.getByteFrequencyData(data);
      const avg = data.reduce((a, b) => a + b, 0) / data.length;
      if (avg > 6) {
        clearTimeout(speakingTimeout);
        setState('speaking');
        speakingTimeout = setTimeout(() => setState('listening'), 700);
      }
      requestAnimationFrame(check);
    }
    check();
  }

  // ─────────────────────────────────────────────────────────
  // Session timer
  // ─────────────────────────────────────────────────────────
  function startTimer() {
    sessionSecs = 0;
    connectStart = Date.now();
    sessionTimer = setInterval(() => {
      sessionSecs = Math.floor((Date.now() - connectStart) / 1000);
      const m = String(Math.floor(sessionSecs / 60)).padStart(2, '0');
      const s = String(sessionSecs % 60).padStart(2, '0');
      $duration.textContent = `${m}:${s}`;
    }, 1000);
  }

  function stopTimer() {
    clearInterval(sessionTimer);
    $duration.textContent = '00:00';
  }

  // ─────────────────────────────────────────────────────────
  // WebRTC connection
  // ─────────────────────────────────────────────────────────
  async function connect() {
    setState('connecting');
    $btnConn.disabled = true;
    $sessionId.textContent = SESSION_ID;

    try {
      // 1. Get microphone
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      startVisualiser(localStream);

      // 2. Create peer connection
      pc = new RTCPeerConnection({
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
        ]
      });

      // 3. Data channel (server → client messages: transcripts, state)
      dataChannel = pc.createDataChannel('chat', { ordered: true });
      dataChannel.onmessage = (ev) => {
        try {
          const msg = JSON.parse(ev.data);
          if (msg.type === 'transcript') {
            addMessage(msg.role, msg.text);
          }
        } catch (_) {}
      };

      // 4. Add local audio tracks
      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

      // 5. Handle remote audio
      pc.ontrack = (ev) => {
        if (ev.streams && ev.streams[0]) {
          $remoteAudio.srcObject = ev.streams[0];
          $remoteAudio.play().catch(() => {});
          watchRemoteAudio(ev.streams[0]);
        }
      };

      // 6. Connection state changes
      pc.onconnectionstatechange = () => {
        const s = pc.connectionState;
        if (s === 'connected') {
          setState('listening');
          startTimer();
          $btnDisc.disabled = false;
          // Measure latency once connected
          const lat = connectStart ? Date.now() - connectStart : null;
          if (lat) $latency.textContent = lat + 'ms';
        }
        if (s === 'failed' || s === 'disconnected' || s === 'closed') {
          handleDisconnect();
        }
      };

      // 7. Create offer
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      // 8. Wait for ICE gathering (max 3s)
      await new Promise((resolve) => {
        if (pc.iceGatheringState === 'complete') return resolve();
        const timer = setTimeout(resolve, 3000);
        pc.addEventListener('icegatheringstatechange', () => {
          if (pc.iceGatheringState === 'complete') {
            clearTimeout(timer);
            resolve();
          }
        });
      });

      // 9. POST offer to FastRTC
      connectStart = Date.now();
      const res = await fetch('/webrtc/offer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sdp:       pc.localDescription.sdp,
          type:      pc.localDescription.type,
          webrtc_id: `nexus-${SESSION_ID}-${Date.now()}`,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Server error: ${res.status}`);
      }

      // 10. Set remote description (answer)
      const answer = await res.json();
      await pc.setRemoteDescription(new RTCSessionDescription(answer));

    } catch (err) {
      console.error('[WebRTC] connect error:', err);
      showToast(err.message || 'Connection failed. Check microphone permissions.');
      handleDisconnect();
    }
  }

  function handleDisconnect() {
    if (pc)          { pc.close();  pc = null; }
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    if (audioCtx)    { audioCtx.close(); audioCtx = null; }

    stopTimer();
    setState('idle');
    $btnConn.disabled    = false;
    $btnDisc.disabled    = true;
    $latency.textContent = '—';

    // Return to idle waveform
    cancelAnimationFrame(animFrame);
    idleWave();
  }

  // ─────────────────────────────────────────────────────────
  // Button handlers
  // ─────────────────────────────────────────────────────────
  $btnConn.addEventListener('click', connect);
  $btnDisc.addEventListener('click', handleDisconnect);
  $orb_el.addEventListener('click', () => {
    if (!pc) connect(); else handleDisconnect();
  });

  // ─────────────────────────────────────────────────────────
  // Init
  // ─────────────────────────────────────────────────────────
  setState('idle');
</script>
</body>
</html>
